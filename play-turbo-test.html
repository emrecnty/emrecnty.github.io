<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>

<style>
body{
margin:0;
background:black;
}

#game{
width:100%;
height:100vh;
}

#turbo{
position:fixed;
right:20px;
bottom:80px;
display:flex;
gap:10px;
z-index:9999;
}

.turbo-btn{
width:70px;
height:40px;
background:#222;
color:white;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
}
</style>
</head>

<body>

<div id="game"></div>

<div id="turbo">
<div id="tb" class="turbo-btn">TB</div>
<div id="ta" class="turbo-btn">TA</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const rom = params.get("rom");
const system = params.get("system");
const core = params.get("core");

EJS_player = "#game";
EJS_core = core;
EJS_gameUrl = "./roms/" + system + "/" + rom;
EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>

function sendKey(key){
document.dispatchEvent(new KeyboardEvent("keydown",{key:key}));
setTimeout(()=>{
document.dispatchEvent(new KeyboardEvent("keyup",{key:key}));
},20);
}

let turboA;
let turboB;

document.getElementById("ta").ontouchstart=()=>{
navigator.vibrate(40);
turboA=setInterval(()=>sendKey("x"),60);
}

document.getElementById("ta").ontouchend=()=>{
clearInterval(turboA);
}

document.getElementById("tb").ontouchstart=()=>{
navigator.vibrate(40);
turboB=setInterval(()=>sendKey("z"),60);
}

document.getElementById("tb").ontouchend=()=>{
clearInterval(turboB);
}

</script>

</body>
</html>
