<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>

<style>
body{
  margin:0;
  background:black;
}

#game{
  width:100%;
  height:100vh;
}

/* Sadece telefon için turbo butonları */
#turbo-wrap{
  position:fixed;
  right:18px;
  bottom:78px;
  display:flex;
  gap:10px;
  z-index:99999;
}

.turbo-btn{
  width:78px;
  height:42px;
  border-radius:12px;
  border:2px solid rgba(255,255,255,0.45);
  background:rgba(35,35,35,0.55);
  color:white;
  font-size:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
  backdrop-filter:blur(2px);
}

.turbo-btn.active{
  transform:scale(0.95);
  background:rgba(120,120,120,0.65);
  border-color:rgba(255,255,255,0.9);
}

@media (hover:hover) and (pointer:fine){
  #turbo-wrap{
    display:none;
  }
}
</style>
</head>

<body>

<div id="game"></div>

<div id="turbo-wrap">
  <div id="turbo-b" class="turbo-btn">TB</div>
  <div id="turbo-a" class="turbo-btn">TA</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const rom = params.get("rom");
const system = params.get("system");
const core = params.get("core");

EJS_player = "#game";
EJS_core = core;
EJS_gameUrl = "./roms/" + system + "/" + rom;
EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>
/* Genel dokunuş titreşimi */
document.addEventListener("touchstart", function() {
  if (navigator.vibrate) navigator.vibrate(50);
}, {passive:true});

/* Turbo denemesi */
const turboTimers = {};
const KEYMAP = {
  a: "x",
  b: "z"
};

function sendKey(type, key){
  const ev = new KeyboardEvent(type, {
    key,
    bubbles:true,
    cancelable:true
  });
  document.dispatchEvent(ev);
  window.dispatchEvent(ev);
}

function turboTap(key){
  sendKey("keydown", key);
  setTimeout(() => sendKey("keyup", key), 20);
}

function bindTurbo(id, key){
  const el = document.getElementById(id);

  const start = (e) => {
    e.preventDefault();
    el.classList.add("active");
    if (navigator.vibrate) navigator.vibrate(25);

    if (turboTimers[id]) return;
    turboTap(key);
    turboTimers[id] = setInterval(() => turboTap(key), 70);
  };

  const end = (e) => {
    e.preventDefault();
    el.classList.remove("active");
    clearInterval(turboTimers[id]);
    turboTimers[id] = null;
  };

  el.addEventListener("touchstart", start, {passive:false});
  el.addEventListener("touchend", end, {passive:false});
  el.addEventListener("touchcancel", end, {passive:false});

  el.addEventListener("mousedown", start);
  el.addEventListener("mouseup", end);
  el.addEventListener("mouseleave", end);
}

bindTurbo("turbo-a", KEYMAP.a);
bindTurbo("turbo-b", KEYMAP.b);
</script>

</body>
</html>
