<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Oyunlar</title>
<style>
body{
  background:#111;
  color:white;
  font-family:Arial,sans-serif;
  margin:0;
  padding:20px;
}
h1{
  margin-top:0;
  margin-bottom:20px;
}
.systems{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}
.system-btn{
  background:#222;
  border:none;
  color:white;
  padding:10px 18px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}
.system-btn.active{
  background:#4da3ff;
}
#search{
  width:100%;
  max-width:500px;
  padding:12px;
  border-radius:8px;
  border:none;
  font-size:16px;
  margin-bottom:20px;
}
#status{
  margin-bottom:15px;
  color:#bbb;
}
.games{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}
.game-link{
  display:block;
  background:#1e1e1e;
  color:#4da3ff;
  text-decoration:none;
  padding:14px;
  border-radius:10px;
  font-size:18px;
}
.game-link:hover{
  background:#2a2a2a;
}
</style>
</head>
<body>

<h1>🎮 Retro Oyunlar</h1>

<div class="systems">
  <button class="system-btn active" data-system="nes">NES</button>
  <button class="system-btn" data-system="snes">SNES</button>
  <button class="system-btn" data-system="genesis">GENESIS</button>
  <button class="system-btn" data-system="mame">MAME</button>
</div>

<input id="search" type="text" placeholder="Oyun ara...">
<div id="status">Oyunlar yükleniyor...</div>
<div id="games" class="games"></div>

<script>
const owner = "emrecnty";
const repo = "emrecnty.github.io";

const systemConfig = {
  nes: {
    folder: "roms/nes",
    ext: ".nes",
    core: "nes"
  },
  snes: {
    folder: "roms/snes",
    ext: ".sfc",
    core: "snes"
  },
  genesis: {
    folder: "roms/genesis",
    ext: ".gen",
    core: "segaMD"
  },
  mame: {
    folder: "roms/mame",
    ext: ".zip",
    core: "mame"
  }
};

let currentSystem = "nes";
let allGames = [];

const gamesContainer = document.getElementById("games");
const statusEl = document.getElementById("status");
const searchEl = document.getElementById("search");
const systemButtons = document.querySelectorAll(".system-btn");

function formatGameName(filename, ext){
  return filename
    .replace(new RegExp(ext.replace(".", "\\.") + "$", "i"), "")
    .replace(/_/g, " ")
    .replace(/\b\w/g, c => c.toUpperCase());
}

function renderGames(filterText = ""){
  gamesContainer.innerHTML = "";

  const filtered = allGames.filter(game =>
    game.title.toLowerCase().includes(filterText.toLowerCase())
  );

  if(filtered.length === 0){
    statusEl.textContent = "Eşleşen oyun bulunamadı.";
    return;
  }

  statusEl.textContent = `${filtered.length} oyun gösteriliyor.`;

  for(const game of filtered){
    const link = document.createElement("a");
    link.className = "game-link";
    link.href = `play.html?system=${encodeURIComponent(currentSystem)}&core=${encodeURIComponent(game.core)}&rom=${encodeURIComponent(game.file)}`;
    link.textContent = game.title;
    gamesContainer.appendChild(link);
  }
}

function loadGames(system){
  currentSystem = system;
  searchEl.value = "";
  gamesContainer.innerHTML = "";
  statusEl.textContent = "Oyunlar yükleniyor...";

  const config = systemConfig[system];
  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${config.folder}`;

  fetch(apiUrl)
    .then(response => {
      if(!response.ok) throw new Error("Oyun listesi alınamadı.");
      return response.json();
    })
    .then(files => {
      allGames = files
        .filter(file => file.type === "file" && file.name.toLowerCase().endsWith(config.ext))
        .map(file => ({
          file: file.name,
          title: formatGameName(file.name, config.ext),
          core: config.core
        }))
        .sort((a, b) => a.title.localeCompare(b.title, "tr"));

      renderGames();
    })
    .catch(error => {
      statusEl.textContent = "Oyun listesi yüklenemedi.";
      console.error(error);
    });
}

systemButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    systemButtons.forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadGames(btn.dataset.system);
  });
});

searchEl.addEventListener("input", () => {
  renderGames(searchEl.value);
});

loadGames("nes");
</script>

</body>
</html>
