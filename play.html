<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oyun</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      max-width: 100%;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    #error {
      display: none;
      color: #fff;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game"></div>
  </div>

  <div id="error"></div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const core = params.get("core");
      const rom = params.get("rom");

      const gameContainer = document.getElementById("game-container");
      const errorEl = document.getElementById("error");

      function showError(message) {
        gameContainer.style.display = "none";
        errorEl.style.display = "block";
        errorEl.textContent = message;
      }

      if (!core || !rom) {
        showError("Eksik parametre: core ve rom gerekli.");
        return;
      }

      window.EJS_player = "#game";
      window.EJS_core = core;
      window.EJS_gameUrl = rom;
      window.EJS_pathtodata = "data/";
      window.EJS_startOnLoaded = true;

      function tryVibrate() {
        try {
          if (navigator.vibrate) navigator.vibrate(15);
        } catch (e) {}
      }

      function bindMobileButtons() {
        const keywords = [
          "up","down","left","right",
          "a","b","x","y",
          "start","select",
          "l","r","l1","r1","l2","r2"
        ];

        const elements = document.querySelectorAll("button, [role='button'], div, span, canvas");

        elements.forEach((el) => {
          if (el.dataset.vibrationBound === "1") return;

          const text = [
            el.textContent || "",
            el.id || "",
            typeof el.className === "string" ? el.className : "",
            el.getAttribute("aria-label") || "",
            el.getAttribute("title") || ""
          ].join(" ").toLowerCase();

          const matched = keywords.some((key) => {
            const parts = text.split(/[^a-z0-9]+/).filter(Boolean);
            return text.trim() === key || parts.includes(key);
          });

          if (!matched) return;

          el.dataset.vibrationBound = "1";
          el.addEventListener("touchstart", tryVibrate, { passive: true });
          el.addEventListener("pointerdown", tryVibrate, { passive: true });
        });
      }

      window.addEventListener("load", function () {
        setTimeout(bindMobileButtons, 1000);
        setTimeout(bindMobileButtons, 2500);
        setTimeout(bindMobileButtons, 4000);
      });

      window.addEventListener("error", function (e) {
        console.error("Sayfa hatası:", e.message);
      });

      const loaderScript = document.createElement("script");
      loaderScript.src = "data/loader.js";

      loaderScript.onerror = function () {
        showError("EmulatorJS yüklenemedi. data/loader.js bulunamadı.");
      };

      document.body.appendChild(loaderScript);
    })();
  </script>
</body>
</html>
