<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <title>Retro Oyun Oynatıcı</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
    #game { width: 100%; height: 100%; touch-action: none; -webkit-user-select: none; user-select: none; }
    
    /* Dokunmatik hassasiyet ayarı */
    .ejs-touch-button {
      padding: 25px !important; 
      margin: -25px !important;
      background-clip: content-box !important;
    }

    .back-btn {
      position: absolute; top: 10px; left: 10px; z-index: 9999; 
      padding: 10px 15px; background: rgba(0,0,0,0.6); color: #fff;
      border: 1px solid #555; border-radius: 8px; text-decoration: none; font-size: 14px;
    }
  </style>
</head>
<body>

  <a href="javascript:history.back()" class="back-btn">← Geri</a>
  <div id="game"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const core = urlParams.get('core');
    const rom = urlParams.get('rom'); // index.html zaten tam yolu gönderiyor

    window.EJS_settings = {
      dataUrl: "https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/",
      core: core,
      rom: rom, // Hatayı burada düzelttim, direkt gelen yolu kullanıyor
      startOnLoaded: true,
      mobileButtonsSize: 60,
      vibration: true,
      touchInputMode: "gamepad"
    };
  </script>
  <script src="https://raw.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js"></script>

</body>
</html>
