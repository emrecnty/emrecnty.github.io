<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Oyun - Mobil Düzenleme</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
      touch-action: none;
    }

    #game { width: 100%; height: 100dvh; }

    /* Navigasyon Butonları */
    .nav-buttons {
      position: fixed;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      justify-content: space-between;
      z-index: 100000;
      pointer-events: none;
    }

    .btn {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 13px;
      backdrop-filter: blur(4px);
    }

    /* Sadece Mobilde Görünecek Düzenleme Paneli */
    #mobile-edit-ui {
      display: none; /* JS ile mobil kontrolü sonrası açılacak */
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 20, 0.95);
      padding: 12px;
      border-radius: 15px;
      z-index: 100001;
      border: 1px solid #007bff;
      flex-direction: column;
      gap: 10px;
      width: 80%;
      max-width: 300px;
    }

    .row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    #save-btn { background: #28a745; border: none; padding: 8px; border-radius: 5px; color: white; font-weight: bold; }

    /* Düzenleme Modu Görsel Efekti */
    .edit-active {
      outline: 2px dashed #007bff !important;
      background: rgba(0, 123, 255, 0.2) !important;
    }
  </style>
</head>
<body>

  <div class="nav-buttons">
    <button class="btn" onclick="history.back()">← Geri</button>
    <button class="btn" id="edit-toggle-btn" style="display:none;">⚙ Tuşları Düzenle</button>
  </div>

  <div id="mobile-edit-ui">
    <div class="row">
      <span>Buton Boyutu:</span>
      <input type="range" id="size-slider" min="0.5" max="2.0" step="0.1" value="1">
    </div>
    <button id="save-btn">💾 Düzeni Kaydet</button>
  </div>

  <div id="game"></div>

  <script>
    // Mobil Cihaz Kontrolü
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    const params = new URLSearchParams(location.search);
    window.EJS_player = "#game";
    window.EJS_core = params.get("core");
    window.EJS_gameUrl = decodeURIComponent(params.get("rom"));
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    let editMode = false;

    if (isMobile) {
      // Sadece mobilde düzenleme butonunu göster
      document.getElementById('edit-toggle-btn').style.display = 'block';

      document.getElementById('edit-toggle-btn').onclick = function() {
        editMode = !editMode;
        document.getElementById('mobile-edit-ui').style.display = editMode ? 'flex' : 'none';
        this.textContent = editMode ? '✖ Kapat' : '⚙ Tuşları Düzenle';

        const buttons = document.querySelectorAll('div[class*="ejs-"], .ejs-touch-button');
        buttons.forEach(btn => {
          if (editMode) {
            btn.classList.add('edit-active');
            enableTouchDrag(btn);
          } else {
            btn.classList.remove('edit-active');
          }
        });
      };
    }

    function enableTouchDrag(el) {
      el.ontouchstart = function(e) {
        if (!editMode) return;
        let touch = e.touches[0];
        let shiftX = touch.clientX - el.getBoundingClientRect().left;
        let shiftY = touch.clientY - el.getBoundingClientRect().top;

        function moveAt(pageX, pageY) {
          el.style.position = 'fixed';
          el.style.left = (pageX - shiftX) + 'px';
          el.style.top = (pageY - shiftY) + 'px';
          el.style.bottom = 'auto';
          el.style.right = 'auto';
        }

        function onTouchMove(event) {
          moveAt(event.touches[0].clientX, event.touches[0].clientY);
        }

        document.addEventListener('touchmove', onTouchMove, {passive: false});

        el.ontouchend = function() {
          document.removeEventListener('touchmove', onTouchMove);
          el.ontouchend = null;
        };
      };
    }

    document.getElementById('size-slider').oninput = (e) => {
      document.querySelectorAll('.edit-active').forEach(btn => {
        btn.style.transform = `scale(${e.target.value})`;
      });
    };

    document.getElementById('save-btn').onclick = () => {
      const layout = {};
      document.querySelectorAll('div[class*="ejs-"], .ejs-touch-button').forEach((btn, i) => {
        layout[btn.id || `b-${i}`] = {
          t: btn.style.top,
          l: btn.style.left,
          s: btn.style.transform,
          c: btn.className
        };
      });
      localStorage.setItem('mobile_layout', JSON.stringify(layout));
      alert('Mobil düzen kaydedildi!');
    };

    // Kayıtlı düzeni periyodik olarak uygula (EmulatorJS dinamik olduğu için)
    setInterval(() => {
      const saved = localStorage.getItem('mobile_layout');
      if (saved && isMobile) {
        const data = JSON.parse(saved);
        Object.keys(data).forEach(id => {
          const el = document.getElementById(id) || document.querySelector(`.${data[id].c.split(' ').join('.')}`);
          if (el) {
            el.style.position = 'fixed';
            el.style.top = data[id].t;
            el.style.left = data[id].l;
            el.style.transform = data[id].s;
            el.style.bottom = 'auto';
            el.style.right = 'auto';
          }
        });
      }
    }, 1000);
  </script>

  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
