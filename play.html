  width:100%;

<body>


  <a href="./">Ana Sayfa</a>
</div>

<div id="game"></div>

<script>
const params = new URLSearchParams(location.search);
const core = params.get("core");
const rom = params.get("rom");

if (!core || !rom) {
  document.getElementById("title").innerText = "Oyun bulunamadı";
  throw new Error("Eksik parametre");
}

const fileName = decodeURIComponent(rom).split("/").pop() || rom;


window.EJS_player = "#game";
window.EJS_core = core;
window.EJS_gameUrl = decodeURIComponent(rom);
window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
window.EJS_startOnLoaded = true;
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>
function startFullscreen(){
  const el = document.documentElement;

  if (el.requestFullscreen) el.requestFullscreen();
  else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(()=>{});
  }
}

document.addEventListener("click", startFullscreen, {once:true});
document.addEventListener("touchstart", startFullscreen, {once:true});

document.addEventListener("touchstart", () => {
  if (navigator.vibrate) navigator.vibrate(60);
});
</script>

</body>
</html>
