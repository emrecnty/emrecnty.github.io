<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oyun</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    #game {
      width: 100%;
      height: 100dvh;
    }

    /* Sol üstteki geri butonu stili */
    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(5px);
      transition: 0.2s;
    }

    .back-btn:hover {
      background: rgba(50, 50, 50, 0.9);
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="history.back()">← Geri</button>

  <div id="game"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    if (!core || !rom) {
      alert("Hata: Oyun verisi eksik!");
      window.location.href = "./";
    }

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = decodeURIComponent(rom);
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    // --- SADECE MOBİLDE TAM EKRAN VE YATAY MOD FONKSİYONU ---
    async function handleMobileView() {
      // Cihaz kontrolü (Mobil mi?)
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || 
                       (window.innerWidth <= 1024);

      if (!isMobile) return; // PC ise hiçbir şey yapma

      try {
        const elem = document.documentElement;
        
        // Tam ekrana geç
        if (elem.requestFullscreen) {
          await elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
          await elem.webkitRequestFullscreen();
        }

        // Ekranı yatay (landscape) kilitle
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape').catch(e => console.log("Oryantasyon hatası"));
        }
      } catch (err) {
        console.log("Giriş etkileşimi gerekiyor veya desteklenmiyor.");
      }
    }

    // İlk dokunuşta/tıklamada (Oyunu Başlat butonu dahil) çalışır
    document.addEventListener("click", handleMobileView, { once: true });
    document.addEventListener("touchstart", handleMobileView, { once: true });
  </script>

<script>
// ====================== SANAL GAMEPAD AYARI ======================
EJS_VirtualGamepadSettings = [
    // SOL TARAF - D-Pad (büyük ve rahat)
    { 
        type: "dpad", 
        location: "left", 
        left: 25, 
        top: 55, 
        size: 130 
    },

    // SAĞ TARAF - Butonlar (klasik ABXY düzeni)
    { type: "button", text: "Y", id: "y", location: "right", left: 35, top: 35, size: 55, input_value: 9 },
    { type: "button", text: "X", id: "x", location: "right", left: 35, top: 85, size: 55, input_value: 1 },
    { type: "button", text: "B", id: "b", location: "right", left: 80, top: 60, size: 55, input_value: 8 },
    { type: "button", text: "A", id: "a", location: "right", left: 125, top: 85, size: 55, input_value: 0 },

    // ALT TARAF - Start & Select
    { type: "button", text: "SELECT", id: "select", location: "bottom", left: 35, size: 65, input_value: 2 },
    { type: "button", text: "START",  id: "start",  location: "bottom", left: 110, size: 65, input_value: 3 }
];
// ================================================================
<script>
  
<script>
document.addEventListener("touchstart", function () {
  if (navigator.vibrate) navigator.vibrate(50);
}, { passive: true });
</script>
  
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
