<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}

#game{
  width:100%;
  height:100dvh;
}

/* Daha net retro görüntü */
#game canvas{
  image-rendering: pixelated;
}

</style>
</head>
<body>

<a href="./" style="position:absolute;z-index:10;color:white;padding:10px">Ana Sayfa</a>

<div id="game"></div>

<script>
const params = new URLSearchParams(location.search);
const core = params.get("core");
const rom = params.get("rom");

if (!core || !rom) {
  throw new Error("Eksik parametre");
}

/* EmulatorJS ayarları */

window.EJS_player = "#game";
window.EJS_core = core;
window.EJS_gameUrl = decodeURIComponent(rom);
window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
window.EJS_startOnLoaded = true;

/* Mobil kontrol iyileştirmeleri */
window.EJS_defaultControls = true;
window.EJS_disableContextMenu = true;
window.EJS_mobileControls = true;
window.EJS_gamepad = true;
window.EJS_keyboard = false;

/* Nostalgia.NES tarzı büyük tuşlar */
window.EJS_touchControls = {
  dpad: { size: 1.6 },
  a: { size: 1.4 },
  b: { size: 1.4 },
  start: { size: 1.1 },
  select: { size: 1.1 }
};

/* Input gecikmesini azalt */
window.EJS_speed = 1;
window.EJS_audioLatency = 0;
window.EJS_frameSkip = false;

</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>
/* Tuş hissi için titreşim */
document.addEventListener("touchstart", () => {
  if (navigator.vibrate) navigator.vibrate(40);
});
</script>

</body>
</html>
