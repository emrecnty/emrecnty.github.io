<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Oyun</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; }
    #game { width: 100%; height: 100dvh; touch-action: none; }
    .back-btn {
      position: fixed; top: 15px; left: 15px; z-index: 99999;
      background: rgba(0, 0, 0, 0.7); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="history.back()">← Geri</button>
  <div id="game"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = decodeURIComponent(rom);
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    // --- SENİN GÖNDERDİĞİN YAPIYLA YENİDEN KURGULANAN KONTROLLER ---
    window.EJS_VirtualGamepadSettings = [
        // SOL TARAF: Hem D-Pad (Basmalı) hem Zone (Kaydırmalı) etkisini veren yapı
        {
            type: "dpad",
            location: "left",
            left: "25%",        // İstediğin gibi bir tık sağa aldık
            top: "55%",         // Baş parmak hizası
            fontSize: 65,       // Hitbox'ı devasa yaptık (Nostalgia hissi)
            vibration: true,    // Titreşimi buraya gömdük
            inputValues: [4, 5, 6, 7] // Standart yön girişleri
        },
        // SAĞ TARAF: Aksiyon Butonları
        {
            type: "button",
            text: "B",
            id: "b",
            location: "right",
            left: 70,           // Konum milimetrik ayarlandı
            top: 45,
            fontSize: 45,
            vibration: true,
            input_value: 8      // B butonu girişi
        },
        {
            type: "button",
            text: "A",
            id: "a",
            location: "right",
            left: 35,
            top: 75,
            fontSize: 45,
            vibration: true,
            input_value: 0      // A butonu girişi
        },
        // ORTA: Start & Select
        {
            type: "button",
            text: "Start",
            id: "start",
            location: "center",
            left: 55,
            fontSize: 20,
            input_value: 3      // Start girişi
        },
        {
            type: "button",
            text: "Select",
            id: "select",
            location: "center",
            left: -5,
            fontSize: 20,
            input_value: 2      // Select girişi
        }
    ];

    // --- TAM EKRAN TETİKLEYİCİ ---
    async function startExperience() {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (isMobile) {
            try {
                const elem = document.documentElement;
                if (elem.requestFullscreen) await elem.requestFullscreen();
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape').catch(() => {});
                }
            } catch (e) {}
        }
    }

    document.addEventListener("touchstart", startExperience, { once: true });
    document.addEventListener("mousedown", startExperience, { once: true });
  </script>

  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
