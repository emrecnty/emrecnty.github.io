<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Oyun</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    #game {
      width: 100%;
      height: 100dvh;
      touch-action: none; /* Tarayıcı gecikmelerini önler */
      user-select: none;
      -webkit-user-select: none;
    }

    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(5px);
      transition: 0.2s;
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="history.back()">← Geri</button>

  <div id="game"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    if (!core || !rom) {
      alert("Hata: Oyun verisi eksik!");
      window.location.href = "./";
    }

    // --- EMULATORJS ANA AYARLAR ---
    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = decodeURIComponent(rom);
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    // --- SANAL KONTROLÖR AYARLARI (VIRTUAL GAMEPAD) ---
    // Bu ayarlar tüm platformlarda en iyi mobil kontrolü sağlar
    window.EJS_VirtualGamepadSettings = {
      vibration: true,       // Basma hissi için titreşim
      fontSize: 50,          // Görünmez basma alanını genişletir
      deadzone: 10,          // Joystick hassasiyeti
      
      // SOL TARAF: Akıcı Joystick (D-Pad yerine)
      leftStick: {
        type: 'zone',        // Nostalgia.NES tarzı kaydırma alanı
        size: 140,           // Geniş kontrol alanı
        position: { left: '12%', bottom: '15%' }
      },
      
      // SAĞ TARAF: Aksiyon Butonları
      // EmulatorJS, platforma göre (NES, SNES vb.) gereksiz olanları gizler
      buttons: [
        { name: 'a', position: { right: '8%', bottom: '22%' } },
        { name: 'b', position: { right: '24%', bottom: '14%' } },
        { name: 'x', position: { right: '8%', bottom: '38%' } },
        { name: 'y', position: { right: '24%', bottom: '30%' } },
        { name: 'l', position: { left: '5%', top: '15%' } },
        { name: 'r', position: { right: '5%', top: '15%' } },
        { name: 'start', position: { right: '45%', bottom: '8%' } },
        { name: 'select', position: { left: '45%', bottom: '8%' } }
      ]
    };

    // --- MOBİL GÖRÜNÜM VE TAM EKRAN ---
    async function handleMobileView() {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (window.innerWidth <= 1024);
      if (!isMobile) return;

      try {
        const elem = document.documentElement;
        if (elem.requestFullscreen) await elem.requestFullscreen();
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape').catch(e => console.log("Yatay mod kilitlenemedi."));
        }
      } catch (err) {
        console.log("Kullanıcı etkileşimi bekleniyor.");
      }
    }

    document.addEventListener("click", handleMobileView, { once: true });
    document.addEventListener("touchstart", handleMobileView, { once: true });
  </script>

  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
