<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}

#game{
  width:100%;
  height:100dvh;
}
</style>

<link rel="stylesheet" href="./controls/nostalgia-touch.css">

</head>
<body>

<a href="./">Ana Sayfa</a>

<div id="game"></div>

<script>
const params = new URLSearchParams(location.search);
const core = params.get("core");
const rom = params.get("rom");

if (!core || !rom) {
  document.getElementById("title").innerText = "Oyun bulunamadı";
  throw new Error("Eksik parametre");
}

const fileName = decodeURIComponent(rom).split("/").pop() || rom;

window.EJS_player = "#game";
window.EJS_core = core;
window.EJS_gameUrl = decodeURIComponent(rom);
window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
window.EJS_startOnLoaded = true;
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script src="./controls/nostalgia-touch.js"></script>

<script>
EJS_onGameStart = function () {

  if (!window.matchMedia("(pointer: coarse)").matches) return;

  if (window.__nostalgiaTouch) {
    window.__nostalgiaTouch.destroy();
  }

  window.__nostalgiaTouch = new NostalgiaTouchEngine({
    target: document.body,
    debug: false
  });

  window.__nostalgiaTouch.init();
};
</script>

<script>
document.addEventListener("touchstart", () => {
  if (navigator.vibrate) navigator.vibrate(60);
});
</script>

</body>
</html>
