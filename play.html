<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>
<style>
  body {
    margin: 0;
    background: #000;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
    overflow: hidden;
  }

  #game {
    width: 100%;
    height: 100dvh;
  }

  .controls {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 9999;
    display: flex;
    gap: 10px;
  }

  .btn {
    background: rgba(255, 255, 255, 0.2);
    border: 1px solid rgba(255, 255, 255, 0.4);
    color: white;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .btn:active {
    background: rgba(255, 255, 255, 0.4);
  }
</style>
</head>
<body>

<div class="controls">
  <div class="btn" onclick="history.back()">⬅ Geri</div>
  <div class="btn" id="fs-btn" onclick="toggleFullScreen()">⛶ Tam Ekran</div>
</div>

<div id="game"></div>

<script>
const params = new URLSearchParams(location.search);
const core = params.get("core");
const rom = params.get("rom");

if (!core || !rom) {
  alert("Oyun parametreleri eksik!");
  throw new Error("Eksik parametre");
}

window.EJS_player = "#game";
window.EJS_core = core;
window.EJS_gameUrl = decodeURIComponent(rom);
window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
window.EJS_startOnLoaded = true;

// Gelişmiş Tam Ekran ve Yatay Mod Fonksiyonu
async function toggleFullScreen() {
  const btn = document.getElementById('fs-btn');
  
  if (!document.fullscreenElement) {
    try {
      await document.documentElement.requestFullscreen();
      
      // Tam ekrana geçince ekranı yatay moda kilitlemeyi dene
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock("landscape").catch(err => {
          console.log("Oryantasyon kilitleme desteklenmiyor veya reddedildi.");
        });
      }
      btn.innerText = "⛶ Küçült";
    } catch (err) {
      console.error(`Hata: ${err.message}`);
    }
  } else {
    if (document.exitFullscreen) {
      // Çıkarken yön kilidini kaldır
      if (screen.orientation && screen.orientation.unlock) {
        screen.orientation.unlock();
      }
      document.exitFullscreen();
      btn.innerText = "⛶ Tam Ekran";
    }
  }
}

// Tam ekran durumunu manuel (ESC tuşu vb.) değişimlerde de takip et
document.addEventListener('fullscreenchange', () => {
  const btn = document.getElementById('fs-btn');
  if (!document.fullscreenElement) {
    btn.innerText = "⛶ Tam Ekran";
  }
});
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>
document.addEventListener("touchstart", (e) => {
  if (e.target.classList.contains('btn')) {
    if (navigator.vibrate) navigator.vibrate(40);
  }
});
</script>

</body>
</html>
