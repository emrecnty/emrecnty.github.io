<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oyun Paneli</title>
<style>
    body { margin:0; background:#000; color:#fff; font-family:sans-serif; overflow:hidden; touch-action:none; }
    #game { width:100%; height:100dvh; }

    /* Üst Panel (Görsel 2) */
    #editPanel {
        position: fixed; top: 0; left: 0; width: 100%; height: 55px;
        background: rgba(0,0,0,0.9); display: none; align-items: center;
        justify-content: center; gap: 15px; z-index: 1000000;
        border-bottom: 2px solid #0095ff;
    }
    #sizeSlider { width: 120px; }
    #saveBtn { background:#0095ff; color:#fff; border:none; padding:8px 20px; border-radius:5px; cursor:pointer; font-weight:bold; }

    /* Düzenleme Açma Butonu (Sağ Üst) */
    #editToggle {
        position: fixed; top: 15px; right: 20px; z-index: 1000001;
        background: rgba(255,255,255,0.1); border: 1px solid #fff;
        border-radius: 8px; padding: 5px; cursor: pointer;
    }

    /* Geri Butonu */
    .back-btn { position: fixed; top: 15px; left: 15px; z-index: 1000001; background:rgba(0,0,0,.5); color:#fff; border:1px solid #555; padding:5px 15px; border-radius:20px; }

    /* Düzenleme Modu Efekti */
    .edit-active [id*="ejs"] {
        outline: 2px solid #0095ff !important;
        background: rgba(0, 149, 255, 0.2) !important;
    }
</style>
</head>
<body>

<button class="back-btn" onclick="history.back()">← Geri</button>

<div id="editToggle">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
</div>

<div id="editPanel">
    <span>Boyut:</span>
    <input type="range" id="sizeSlider" min="30" max="150" value="60">
    <button id="saveBtn">SAVE</button>
</div>

<div id="game"></div>

<script>
    const params = new URLSearchParams(location.search);
    const core = params.get("core");
    const storageKey = `layout_data_${core}`;

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = decodeURIComponent(params.get("rom"));
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    let isEditing = false;
    let selectedEl = null;

    // --- 1. OTOMATİK TARAMA VE DÜZENLEME MANTIĞI ---
    const initEditor = () => {
        const gameDiv = document.getElementById('game');
        
        // Düzenleme modunu aç/kapat
        document.getElementById('editToggle').onclick = () => {
            isEditing = !isEditing;
            document.getElementById('editPanel').style.display = isEditing ? 'flex' : 'none';
            document.body.classList.toggle('edit-active', isEditing);
            if(!isEditing) selectedEl = null;
        };

        // Tuşlara dokunma ve taşıma
        document.addEventListener('touchstart', (e) => {
            if(!isEditing) return;
            
            // EmulatorJS'in oluşturduğu butonları (div) yakala
            const btn = e.target.closest('div[id*="ejs"]');
            if(!btn) return;

            e.preventDefault();
            selectedEl = btn;
            
            const touch = e.touches[0];
            let startX = touch.clientX - btn.offsetLeft;
            let startY = touch.clientY - btn.offsetTop;

            // Slider değerini seçili butona göre ayarla
            document.getElementById('sizeSlider').value = parseInt(window.getComputedStyle(btn).width);

            const onMove = (me) => {
                const mt = me.touches[0];
                btn.style.left = (mt.clientX - startX) + 'px';
                btn.style.top = (mt.clientY - startY) + 'px';
                btn.style.right = 'auto'; // Eski pozisyonu sıfırla
                btn.style.bottom = 'auto';
            };

            const onEnd = () => {
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
            };

            document.addEventListener('touchmove', onMove, {passive: false});
            document.addEventListener('touchend', onEnd);
        }, {passive: false});

        // Boyutlandırma sliderı
        document.getElementById('sizeSlider').oninput = (e) => {
            if(selectedEl) {
                const val = e.target.value + 'px';
                selectedEl.style.width = val;
                selectedEl.style.height = val;
            }
        };

        // Kaydetme butonu
        document.getElementById('saveBtn').onclick = () => {
            const config = {};
            document.querySelectorAll('div[id*="ejs"]').forEach(el => {
                if(el.style.left) { // Sadece taşınmış olanları kaydet
                    config[el.id] = {
                        left: el.style.left,
                        top: el.style.top,
                        size: el.style.width
                    };
                }
            });
            localStorage.setItem(storageKey, JSON.stringify(config));
            alert("Düzen kaydedildi!");
            location.reload();
        };
    };

    // --- 2. KAYITLI DÜZENİ YÜKLEME ---
    const applySavedLayout = () => {
        const saved = JSON.parse(localStorage.getItem(storageKey));
        if(!saved) return;

        // Butonlar ekrana geç geldiği için belli aralıklarla kontrol et
        const scanner = setInterval(() => {
            let foundCount = 0;
            for(let id in saved) {
                const el = document.getElementById(id);
                if(el) {
                    el.style.position = "fixed";
                    el.style.left = saved[id].left;
                    el.style.top = saved[id].top;
                    el.style.width = saved[id].size;
                    el.style.height = saved[id].size;
                    foundCount++;
                }
            }
            // Tüm kayıtlı tuşlar bulunduysa taramayı durdur
            if(foundCount > 0) clearInterval(scanner);
        }, 500);
        
        // 10 saniye sonra hala bulamadıysa vazgeç
        setTimeout(() => clearInterval(scanner), 10000);
    };

    // EmulatorJS hazır olduğunda sistemleri başlat
    window.EJS_onGameStart = () => {
        initEditor();
        applySavedLayout();
    };
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
