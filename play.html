<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oyun</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    #game-wrap {
      width: 100%;
      height: 100vh;
      max-width: 100%;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    #error {
      display: none;
      color: #fff;
      padding: 24px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="game-wrap">
    <div id="game"></div>
  </div>
  <div id="error"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    const gameEl = document.getElementById("game-wrap");
    const errorEl = document.getElementById("error");

    if (!core || !rom) {
      gameEl.style.display = "none";
      errorEl.style.display = "block";
      errorEl.textContent = "Eksik parametre: core ve rom gerekli.";
      throw new Error("Missing core or rom parameter");
    }

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = rom;
    window.EJS_pathtodata = "data/";
    window.EJS_startOnLoaded = true;

    function vibrateShort() {
      try {
        if (navigator.vibrate) navigator.vibrate(18);
      } catch (_) {}
    }

    const controlKeywords = [
      "up", "down", "left", "right",
      "a", "b", "x", "y",
      "start", "select",
      "l", "r", "l1", "r1", "l2", "r2"
    ];

    function matchesControlText(value) {
      if (!value) return false;
      const normalized = value.toLowerCase().trim();
      const parts = normalized.split(/[^a-z0-9]+/).filter(Boolean);
      return controlKeywords.some(key => normalized === key || parts.includes(key));
    }

    function isGameControl(el) {
      if (!el) return false;
      const values = [
        el.textContent || "",
        el.innerText || "",
        el.id || "",
        typeof el.className === "string" ? el.className : "",
        el.getAttribute("aria-label") || "",
        el.getAttribute("title") || ""
      ];
      return values.some(matchesControlText);
    }

    function bindMobileVibration(root = document) {
      const elements = root.querySelectorAll("button, [role='button'], div, span, canvas");
      elements.forEach(el => {
        if (el.dataset.vibrationBound === "1") return;
        if (!isGameControl(el)) return;

        el.dataset.vibrationBound = "1";
        const handler = () => vibrateShort();
        el.addEventListener("touchstart", handler, { passive: true });
        el.addEventListener("pointerdown", handler, { passive: true });
      });
    }

    const observer = new MutationObserver(() => bindMobileVibration(document));
    observer.observe(document.documentElement, { childList: true, subtree: true });

    window.addEventListener("load", () => {
      bindMobileVibration(document);
      setTimeout(() => bindMobileVibration(document), 1200);
      setTimeout(() => bindMobileVibration(document), 2500);
    });
  </script>

  <script src="data/loader.js"></script>
</body>
</html>
