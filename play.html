<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oyun</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
    #game { width: 100%; height: 100dvh; }
    .back-btn {
      position: fixed; top: 15px; left: 15px; z-index: 99999;
      background: rgba(0, 0, 0, 0.7); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="history.back()">← Geri</button>
  <div id="game"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    if (!core || !rom) {
      alert("Hata: Oyun verisi eksik!");
      window.location.href = "./";
    }

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = decodeURIComponent(rom);
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    // --- SADECE D-PAD BOYUTUNU BÜYÜTEN AYAR ---
    window.EJS_VirtualGamepadSettings = {
        fontSize: 80 // D-Pad ve butonların dokunma/görsel alanını büyütür
    };

    async function handleMobileView() {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (window.innerWidth <= 1024);
      if (!isMobile) return;
      try {
        const elem = document.documentElement;
        if (elem.requestFullscreen) { await elem.requestFullscreen(); }
        else if (elem.webkitRequestFullscreen) { await elem.webkitRequestFullscreen(); }
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape').catch(e => console.log("Oryantasyon hatası"));
        }
      } catch (err) { console.log("Giriş etkileşimi gerekiyor."); }
    }

    document.addEventListener("click", handleMobileView, { once: true });
    document.addEventListener("touchstart", handleMobileView, { once: true });
  </script>

  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
