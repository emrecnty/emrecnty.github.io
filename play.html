<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const core = params.get("core");
  const rom = params.get("rom");
  const errorEl = document.getElementById("error");

  function fail(message) {
    document.getElementById("game-container").style.display = "none";
    errorEl.style.display = "block";
    errorEl.textContent = message;
  }

  if (!core || !rom) {
    fail("Eksik parametre: core ve rom gerekli.");
    return;
  }

  console.log("EJS core:", core);
  console.log("EJS rom:", rom);
  console.log("EJS data path:", "data/");

  fetch("data/loader.js", { method: "HEAD" })
    .then(r => {
      if (!r.ok) throw new Error("loader.js bulunamadı: " + r.status);
      return fetch(rom, { method: "HEAD" });
    })
    .then(r => {
      if (!r.ok) throw new Error("ROM bulunamadı: " + r.status + " -> " + rom);

      window.EJS_player = "#game";
      window.EJS_core = core;
      window.EJS_gameUrl = rom;
      window.EJS_pathtodata = "data/";
      window.EJS_startOnLoaded = true;

      const s = document.createElement("script");
      s.src = "data/loader.js";
      s.onerror = () => fail("EmulatorJS loader yüklenemedi.");
      document.body.appendChild(s);
    })
    .catch(err => fail("Başlatma hatası: " + err.message));
})();
</script>
