<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Oyun</title>
  <style>
    :root {
      --ui-z: 100001;
      --accent: #34a5ff;
      --save: #2da8ff;
      --ring: rgba(255,255,255,.72);
      --ring-selected: #3db2ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      touch-action: manipulation;
    }

    #game {
      width: 100%;
      height: 100dvh;
    }

    .back-btn {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 99999;
      background: rgba(0, 0, 0, 0.68);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.28);
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      backdrop-filter: blur(5px);
    }

    .mobile-only { display: none; }
    body.mobile-edit-ui .mobile-only { display: block; }

    #editTrigger {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: calc(var(--ui-z) + 1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,.28);
      background: rgba(0,0,0,.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      backdrop-filter: blur(6px);
    }
    body.mobile-edit-ui #editTrigger { display: flex; }

    #editTrigger svg {
      width: 26px;
      height: 26px;
      opacity: .92;
    }

    #editModeDot {
      position: fixed;
      top: 20px;
      right: 18px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #33dd66;
      box-shadow: 0 0 0 2px rgba(0,0,0,.35);
      z-index: calc(var(--ui-z) + 2);
      display: none;
    }

    #editToolbar {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: var(--ui-z);
      display: none;
      align-items: center;
      gap: 14px;
      color: #fff;
      font-size: 18px;
      line-height: 1;
      white-space: nowrap;
    }

    #editToolbar.show {
      display: flex;
    }

    .toolbar-label {
      font-size: clamp(14px, 2.1vw, 20px);
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
    }

    .toolbar-slider-wrap {
      width: min(220px, 30vw);
      min-width: 130px;
      display: flex;
      align-items: center;
    }

    #sizeSlider {
      width: 100%;
      accent-color: var(--save);
    }

    #saveBtn {
      border: 0;
      background: var(--save);
      color: #fff;
      height: 52px;
      min-width: 116px;
      border-radius: 10px;
      font-size: clamp(15px, 2vw, 20px);
      padding: 0 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(45,168,255,.28);
    }

    #resetBtn {
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.42);
      color: rgba(255,255,255,.92);
      height: 52px;
      min-width: 88px;
      border-radius: 10px;
      font-size: 14px;
      padding: 0 14px;
      cursor: pointer;
    }

    .ejs-edit-mode {
      touch-action: none !important;
      user-select: none !important;
      cursor: move !important;
    }

    .ejs-edit-ring {
      box-shadow: inset 0 0 0 2px var(--ring);
      border-style: dashed !important;
    }

    .ejs-edit-selected {
      box-shadow: inset 0 0 0 2px var(--ring-selected), 0 0 0 2px rgba(61,178,255,.2) !important;
    }

    .ejs-edit-ghost {
      position: fixed;
      z-index: calc(var(--ui-z) - 1);
      pointer-events: none;
      border: 2px dashed var(--ring);
      border-radius: 18px;
    }

    .ejs-edit-ghost.selected {
      border-color: var(--ring-selected);
      box-shadow: 0 0 0 2px rgba(61,178,255,.14);
    }

    @media (max-width: 820px) {
      #editToolbar {
        gap: 10px;
        top: 10px;
      }
      #saveBtn, #resetBtn {
        height: 46px;
        min-width: 94px;
      }
      .toolbar-slider-wrap {
        width: min(150px, 28vw);
      }
      .back-btn {
        font-size: 13px;
        padding: 7px 13px;
      }
    }
  </style>
</head>
<body>
  <button class="back-btn" onclick="history.back()">← Geri</button>

  <button id="editTrigger" class="mobile-only" type="button" aria-label="Kontrolleri düzenle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 3v4"></path>
      <path d="M12 17v4"></path>
      <path d="M3 12h4"></path>
      <path d="M17 12h4"></path>
      <path d="M12 8a4 4 0 1 0 0 8a4 4 0 0 0 0-8z"></path>
    </svg>
  </button>

  <div id="editModeDot" class="mobile-only"></div>

  <div id="editToolbar" class="mobile-only">
    <div class="toolbar-label">Size:</div>
    <div class="toolbar-slider-wrap">
      <input id="sizeSlider" type="range" min="0.60" max="2.20" step="0.05" value="1">
    </div>
    <button id="saveBtn" type="button">Save</button>
    <button id="resetBtn" type="button">Reset</button>
  </div>

  <div id="game"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    if (!core || !rom) {
      alert("Hata: Oyun verisi eksik!");
      window.location.href = "./";
    }

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = decodeURIComponent(rom);
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    function isMobileDevice() {
      return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || window.innerWidth <= 1024;
    }

    async function handleMobileView() {
      if (!isMobileDevice()) return;
      try {
        const elem = document.documentElement;
        if (elem.requestFullscreen) await elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) await elem.webkitRequestFullscreen();
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock("landscape").catch(() => {});
        }
      } catch (err) {
        console.log("Tam ekran/orientation desteklenmiyor ya da giriş etkileşimi gerekiyor.");
      }
    }

    document.addEventListener("click", handleMobileView, { once: true });
    document.addEventListener("touchstart", handleMobileView, { once: true });

    if (isMobileDevice()) document.body.classList.add("mobile-edit-ui");

    const STORAGE_KEY = `ejs_control_layout_v2:${core}:${decodeURIComponent(rom)}`;
    const editTrigger = document.getElementById("editTrigger");
    const editModeDot = document.getElementById("editModeDot");
    const editToolbar = document.getElementById("editToolbar");
    const sizeSlider = document.getElementById("sizeSlider");
    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");

    let editMode = false;
    let selectedControl = null;
    let dragState = null;
    let bindDone = false;
    let ghostMap = new Map();

    function loadLayout() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }
      catch { return {}; }
    }

    function persistLayout(layout) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
    }

    function clamp(num, min, max) {
      return Math.max(min, Math.min(max, num));
    }

    function pxToVw(px) { return +(px / window.innerWidth * 100).toFixed(3); }
    function pxToVh(px) { return +(px / window.innerHeight * 100).toFixed(3); }
    function vwToPx(vw) { return (vw / 100) * window.innerWidth; }
    function vhToPx(vh) { return (vh / 100) * window.innerHeight; }

    function getTextKey(el) {
      const txt = (el.textContent || "").trim().toUpperCase();
      if (txt === "A") return "a";
      if (txt === "B") return "b";
      if (txt === "X") return "x";
      if (txt === "Y") return "y";
      if (txt === "L") return "l";
      if (txt === "R") return "r";
      if (txt === "START") return "start";
      if (txt === "SELECT") return "select";
      return null;
    }

    function isVisibleControl(el) {
      const rect = el.getBoundingClientRect();
      const style = getComputedStyle(el);
      return rect.width > 18 && rect.height > 18 &&
             style.display !== "none" && style.visibility !== "hidden" &&
             parseFloat(style.opacity || "1") > 0.02;
    }

    function controlArea(rect) {
      return rect.width * rect.height;
    }

    function detectDpadCandidate(elements) {
      const candidates = elements.filter(el => {
        if (!isVisibleControl(el)) return false;
        if (getTextKey(el)) return false;
        if (el.closest("#editToolbar") || el.closest("#editTrigger")) return false;
        const rect = el.getBoundingClientRect();
        if (rect.left > window.innerWidth * 0.45) return false;
        if (rect.top < window.innerHeight * 0.20) return false;
        if (rect.width < 54 || rect.height < 54) return false;
        const txt = (el.textContent || "").trim();
        return txt.length === 0;
      });

      if (!candidates.length) return null;
      return candidates.sort((a, b) => controlArea(b.getBoundingClientRect()) - controlArea(a.getBoundingClientRect()))[0];
    }

    function findControls() {
      const els = [...document.querySelectorAll("button, div, span, canvas")];
      const controls = [];
      const used = new Set();

      els.forEach(el => {
        const key = getTextKey(el);
        if (!key || !isVisibleControl(el)) return;
        const rect = el.getBoundingClientRect();
        if (rect.left < 0 || rect.top < 0) return;
        el.dataset.ejsControlKey = key;
        controls.push(el);
        used.add(el);
      });

      const dpad = detectDpadCandidate(els.filter(el => !used.has(el)));
      if (dpad) {
        dpad.dataset.ejsControlKey = "dpad";
        controls.push(dpad);
      }

      const unique = new Map();
      controls.forEach(el => {
        const key = el.dataset.ejsControlKey;
        if (!unique.has(key)) unique.set(key, el);
      });
      return [...unique.values()];
    }

    function getGhost(el) {
      if (ghostMap.has(el)) return ghostMap.get(el);
      const ghost = document.createElement("div");
      ghost.className = "ejs-edit-ghost";
      document.body.appendChild(ghost);
      ghostMap.set(el, ghost);
      return ghost;
    }

    function syncGhost(el) {
      const ghost = getGhost(el);
      const rect = el.getBoundingClientRect();
      ghost.style.left = rect.left + "px";
      ghost.style.top = rect.top + "px";
      ghost.style.width = rect.width + "px";
      ghost.style.height = rect.height + "px";
      ghost.style.borderRadius = getComputedStyle(el).borderRadius || "18px";
      ghost.style.display = editMode ? "block" : "none";
      ghost.classList.toggle("selected", selectedControl === el);
    }

    function syncAllGhosts() {
      findControls().forEach(syncGhost);
    }

    function hideGhosts() {
      ghostMap.forEach(ghost => ghost.style.display = "none");
    }

    function applyLayoutToElement(el, data) {
      el.style.position = "fixed";
      el.style.left = `${vwToPx(data.left)}px`;
      el.style.top = `${vhToPx(data.top)}px`;
      el.style.right = "auto";
      el.style.bottom = "auto";
      el.style.margin = "0";
      el.style.zIndex = "99998";
      el.style.transformOrigin = "center center";
      el.style.transform = `scale(${data.scale || 1})`;
      el.dataset.ejsScale = String(data.scale || 1);
      syncGhost(el);
    }

    function applySavedLayout() {
      const saved = loadLayout();
      findControls().forEach(el => {
        const key = el.dataset.ejsControlKey;
        if (saved[key]) applyLayoutToElement(el, saved[key]);
      });
    }

    function saveElementState(el, layout = null) {
      const key = el.dataset.ejsControlKey;
      if (!key) return;
      const rect = el.getBoundingClientRect();
      const target = layout || loadLayout();
      target[key] = {
        left: pxToVw(rect.left),
        top: pxToVh(rect.top),
        scale: +(+(el.dataset.ejsScale || "1")).toFixed(2)
      };
      if (!layout) persistLayout(target);
    }

    function selectControl(el) {
      findControls().forEach(node => node.classList.remove("ejs-edit-selected"));
      selectedControl = el;
      if (!el) {
        sizeSlider.value = "1";
        syncAllGhosts();
        return;
      }
      el.classList.add("ejs-edit-selected");
      sizeSlider.value = (+(el.dataset.ejsScale || "1")).toFixed(2);
      syncAllGhosts();
    }

    function decorateControl(el) {
      const key = el.dataset.ejsControlKey;
      if (!key) return;
      el.classList.add("ejs-edit-mode", "ejs-edit-ring");
      if (key === "dpad") {
        el.style.borderStyle = "dashed";
        el.style.borderColor = "rgba(54,181,255,.95)";
      }
      syncGhost(el);
    }

    function undecorateControl(el) {
      el.classList.remove("ejs-edit-mode", "ejs-edit-ring", "ejs-edit-selected");
    }

    function bindControl(el) {
      if (el.dataset.ejsEditorBound === "1") return;
      el.dataset.ejsEditorBound = "1";

      el.addEventListener("pointerdown", e => {
        if (!editMode || !isMobileDevice()) return;
        e.preventDefault();
        e.stopPropagation();
        selectControl(el);
        const rect = el.getBoundingClientRect();
        dragState = {
          el,
          startX: e.clientX,
          startY: e.clientY,
          left: rect.left,
          top: rect.top
        };
        if (el.setPointerCapture) {
          try { el.setPointerCapture(e.pointerId); } catch {}
        }
      });

      el.addEventListener("pointermove", e => {
        if (!editMode || !dragState || dragState.el !== el) return;
        e.preventDefault();
        const dx = e.clientX - dragState.startX;
        const dy = e.clientY - dragState.startY;
        const rect = el.getBoundingClientRect();
        const nextLeft = clamp(dragState.left + dx, 0, window.innerWidth - rect.width);
        const nextTop = clamp(dragState.top + dy, 0, window.innerHeight - rect.height);
        el.style.position = "fixed";
        el.style.left = `${nextLeft}px`;
        el.style.top = `${nextTop}px`;
        el.style.right = "auto";
        el.style.bottom = "auto";
        el.style.margin = "0";
        el.style.zIndex = "99998";
        syncGhost(el);
      });

      const finish = () => {
        if (!dragState || dragState.el !== el) return;
        dragState = null;
        syncGhost(el);
      };

      el.addEventListener("pointerup", finish);
      el.addEventListener("pointercancel", finish);
      el.addEventListener("click", e => {
        if (!editMode) return;
        e.preventDefault();
        e.stopPropagation();
        selectControl(el);
      });
    }

    function bindControlsOnceReady() {
      const controls = findControls();
      if (!controls.length) return false;
      controls.forEach(bindControl);
      if (!bindDone) {
        applySavedLayout();
        bindDone = true;
      }
      return true;
    }

    function enterEditMode() {
      if (!isMobileDevice()) return;
      editMode = true;
      editToolbar.classList.add("show");
      editModeDot.style.display = "block";
      editTrigger.style.display = "none";
      const controls = findControls();
      controls.forEach(el => {
        bindControl(el);
        decorateControl(el);
      });
      if (!selectedControl && controls.length) selectControl(controls[0]);
      syncAllGhosts();
    }

    function exitEditMode() {
      editMode = false;
      editToolbar.classList.remove("show");
      editModeDot.style.display = "none";
      editTrigger.style.display = "flex";
      findControls().forEach(undecorateControl);
      selectedControl = null;
      dragState = null;
      hideGhosts();
    }

    function saveAllControls() {
      const layout = loadLayout();
      findControls().forEach(el => saveElementState(el, layout));
      persistLayout(layout);
      exitEditMode();
    }

    function resetControls() {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    sizeSlider.addEventListener("input", () => {
      if (!selectedControl) return;
      const value = +sizeSlider.value;
      selectedControl.dataset.ejsScale = String(value);
      selectedControl.style.transformOrigin = "center center";
      selectedControl.style.transform = `scale(${value})`;
      syncGhost(selectedControl);
    });

    editTrigger.addEventListener("click", () => {
      if (editMode) exitEditMode();
      else enterEditMode();
    });

    saveBtn.addEventListener("click", saveAllControls);
    resetBtn.addEventListener("click", resetControls);

    function waitForEmulatorControls() {
      let tries = 0;
      const timer = setInterval(() => {
        tries += 1;
        const ok = bindControlsOnceReady();
        if (ok || tries > 40) clearInterval(timer);
      }, 500);
    }

    window.addEventListener("resize", () => {
      if (!bindDone) return;
      applySavedLayout();
      if (editMode) syncAllGhosts();
    });

    window.addEventListener("load", () => {
      if (isMobileDevice()) waitForEmulatorControls();
    });
  </script>

  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
