<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oyun</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    #game {
      width: 100%;
      height: 100vh;
    }

    #error {
      display: none;
      padding: 24px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="game"></div>
  <div id="error"></div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    const errorBox = document.getElementById("error");

    if (!core || !rom) {
      document.getElementById("game").style.display = "none";
      errorBox.style.display = "block";
      errorBox.textContent = "Eksik parametre: core ve rom gerekli.";
      throw new Error("Missing core or rom parameter");
    }

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = rom;
    window.EJS_pathtodata = "data/";
    window.EJS_startOnLoaded = true;
    window.EJS_threads = false;

    function vibrateOnce() {
      try {
        if (navigator.vibrate) {
          navigator.vibrate(60);
        }
      } catch (_) {}
    }

    function isVisible(el) {
      if (!el) return false;
      const style = window.getComputedStyle(el);
      const rect = el.getBoundingClientRect();
      return style.display !== "none" &&
             style.visibility !== "hidden" &&
             rect.width > 0 &&
             rect.height > 0;
    }

    function isControlButton(el) {
      if (!el) return false;

      const text = (el.innerText || el.textContent || "").trim().toLowerCase();
      const cls = ((el.className && el.className.toString()) || "").toLowerCase();
      const id = (el.id || "").toLowerCase();
      const aria = (el.getAttribute("aria-label") || "").trim().toLowerCase();
      const title = (el.getAttribute("title") || "").trim().toLowerCase();

      const keywords = [
        "up", "down", "left", "right",
        "a", "b", "x", "y",
        "start", "select",
        "l", "r", "l1", "r1", "l2", "r2"
      ];

      const values = [text, cls, id, aria, title];

      return values.some(value => {
        if (!value) return false;
        return keywords.some(k => {
          if (value === k) return true;
          return value.split(/[^a-z0-9]+/).includes(k);
        });
      });
    }

    function bindVibration(root = document) {
      const selector = "button, [role='button'], .btn, .button, .gamepad, .controls, .controller, .ejs--button, .ejs_button";
      const elements = root.querySelectorAll(selector);

      elements.forEach(el => {
        if (el.dataset.vibrationBound === "1") return;
        el.dataset.vibrationBound = "1";

        const handler = (event) => {
          const target = event.currentTarget;
          if (isVisible(target) && isControlButton(target)) {
            vibrateOnce();
          }
        };

        el.addEventListener("touchstart", handler, { passive: true });
        el.addEventListener("pointerdown", handler, { passive: true });
      });
    }

    const observer = new MutationObserver(() => {
      bindVibration(document);
    });

    observer.observe(document.documentElement, {
      childList: true,
      subtree: true
    });

    document.addEventListener("DOMContentLoaded", () => {
      bindVibration(document);
    });

    window.addEventListener("load", () => {
      bindVibration(document);
      setTimeout(() => bindVibration(document), 1000);
      setTimeout(() => bindVibration(document), 2500);
    });
  </script>

  <script src="minify/emulator.js"></script>
</body>
</html>
