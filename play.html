<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Oyun</title>
  <style>
    body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
    #game { width: 100%; height: 100dvh; touch-action: none; -webkit-user-select: none; user-select: none; }
    
    .back-btn {
      position: fixed; top: 15px; left: 15px; z-index: 99999;
      background: rgba(0, 0, 0, 0.7); color: #fff; border: 1px solid rgba(255, 255, 255, 0.3);
      padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="history.back()">← Geri</button>
  <div id="game"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    if (!core || !rom) {
      alert("Hata: Oyun verisi eksik!");
      window.location.href = "./";
    }

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = decodeURIComponent(rom);
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

    // --- ÖZEL MOBİL KONTROL AYARLARI ---
    window.EJS_VirtualGamepadSettings = {
      vibration: true,       // Her basışta fiziksel geri bildirim
      fontSize: 60,          // Dokunma algılama alanını devasa yapar (Hitbox)
      deadzone: 5,           // En ufak dokunuşu bile kaçırmaz
      
      // SOL TARAF: D-Pad (Hem basmalı hem kaydırmalı mod)
      leftStick: {
        type: 'd-pad',       // Görsel olarak D-Pad, ama genişletilmiş alanla
        position: { left: '22%', bottom: '18%' } // Biraz sağa ve yukarı alındı
      },
      
      // SAĞ TARAF: Aksiyon Butonları
      buttons: [
        { name: 'a', position: { right: '10%', bottom: '25%' } },
        { name: 'b', position: { right: '28%', bottom: '15%' } },
        { name: 'start', position: { right: '45%', bottom: '8%' } },
        { name: 'select', position: { left: '45%', bottom: '8%' } }
      ]
    };

    // Tam ekran ve yatay mod fonksiyonu
    async function handleMobileView() {
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || (window.innerWidth <= 1024);
      if (!isMobile) return;
      try {
        const elem = document.documentElement;
        if (elem.requestFullscreen) await elem.requestFullscreen();
        if (screen.orientation && screen.orientation.lock) {
          await screen.orientation.lock('landscape').catch(e => console.log("Hata"));
        }
      } catch (err) {}
    }

    document.addEventListener("touchstart", handleMobileView, { once: true });
  </script>

  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
