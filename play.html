<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial,Helvetica,sans-serif;
}


#game{
  width:100%;
  height:100dvh;
}

#controls{
  position:fixed;
  top:10px;
  left:10px;
  display:flex;
  gap:6px;
  z-index:9999;
}

#controls button{
  width:34px;
  height:34px;
  border:none;
  border-radius:6px;
  background:rgba(0,0,0,.6);
  color:#fff;
  font-size:16px;
  cursor:pointer;
}


</style>
</head>
<body>



<div id="controls">
  <button id="backBtn">←</button>
  <button id="fsBtn">⛶</button>
</div>

<div id="game"></div>


<script>
const params = new URLSearchParams(location.search);
const core = params.get("core");
const rom = params.get("rom");

if (!core || !rom) {
  document.getElementById("title").innerText = "Oyun bulunamadı";
  throw new Error("Eksik parametre");
}

const fileName = decodeURIComponent(rom).split("/").pop() || rom;


window.EJS_player = "#game";
window.EJS_core = core;
window.EJS_gameUrl = decodeURIComponent(rom);
window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
window.EJS_startOnLoaded = true;
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

<script>
document.addEventListener("touchstart", () => {
  if (navigator.vibrate) navigator.vibrate(60);
});
</script>


<script>
document.getElementById("backBtn").onclick = () => {
  window.location.href = "./";
};

document.getElementById("fsBtn").onclick = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
};
</script>

</body>
</html>
