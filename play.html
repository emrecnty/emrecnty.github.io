<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial,Helvetica,sans-serif;
overflow:hidden;
}

#game{
width:100%;
height:100dvh;
}

/* ortak buton stili */
.control-btn{
position:fixed;
top:15px;
z-index:99999;
background:rgba(0,0,0,.7);
color:#fff;
border:1px solid rgba(255,255,255,.3);
padding:6px 12px;
border-radius:18px;
font-size:12px;
cursor:pointer;
display:flex;
align-items:center;
gap:4px;
backdrop-filter:blur(5px);
transition:.2s;
}

.control-btn:hover{
background:rgba(50,50,50,.9);
}

/* geri */
.back-btn{
left:15px;
}

/* fullscreen */
.fullscreen-btn{
left:90px;
}

/* edit butonu */
.edit-btn{
position:fixed;
top:15px;
right:55px; /* üç çizgiden uzak */
z-index:99999;

width:34px;
height:34px;

background:rgba(0,0,0,.7); /* beyaz değil */
color:#fff;

border:1px solid rgba(255,255,255,.3);
border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:18px;
cursor:pointer;

backdrop-filter:blur(5px);
transition:.2s;
}

.edit-btn:hover{
background:rgba(50,50,50,.9);
}

</style>
</head>

<body>

<button class="control-btn back-btn" onclick="history.back()">←</button>

<button id="fullscreenBtn" class="control-btn fullscreen-btn">⛶</button>

<!-- düzenleme butonu -->
<button id="editBtn" class="edit-btn">✚</button>

<div id="game"></div>

<script>

const params=new URLSearchParams(location.search);
const core=params.get("core");
const rom=params.get("rom");

if(!core||!rom){
alert("Hata: Oyun verisi eksik!");
window.location.href="./";
}

window.EJS_player="#game";
window.EJS_core=core;
window.EJS_gameUrl=decodeURIComponent(rom);
window.EJS_pathtodata="https://cdn.emulatorjs.org/stable/data/";

/* fullscreen toggle */

const fsBtn=document.getElementById("fullscreenBtn");

fsBtn.addEventListener("click",async()=>{

if(!document.fullscreenElement){

const el=document.documentElement;

if(el.requestFullscreen){
await el.requestFullscreen();
}else if(el.webkitRequestFullscreen){
await el.webkitRequestFullscreen();
}

}else{

if(document.exitFullscreen){
document.exitFullscreen();
}else if(document.webkitExitFullscreen){
document.webkitExitFullscreen();
}

}

});

// oyun alanına ilk dokunuşta fullscreen
document.getElementById("game").addEventListener("click", async () => {

  if (!document.fullscreenElement) {

    const el = document.documentElement;

    if (el.requestFullscreen) {
      await el.requestFullscreen();
    } 
    else if (el.webkitRequestFullscreen) {
      await el.webkitRequestFullscreen();
    }

  }

}, { once:true });

</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
