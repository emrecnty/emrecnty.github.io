<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NES Oyun</title>
<style>
body{
margin:0;
background:black;
}
#game{
width:100%;
height:100vh;
}
</style>
</head>

<body>

<div id="game"></div>

<script>
const params = new URLSearchParams(location.search);
const rom = params.get("rom");

EJS_player = "#game";
EJS_core = "nes";
EJS_gameUrl = "./roms/nes/" + rom;
EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
