<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oyun</title>
<style>
  body { margin: 0; background: #000; color: #fff; font-family: Arial, sans-serif; overflow: hidden; }
  #game { width: 100%; height: 100dvh; }
  
  /* Görseldeki Geri Butonu Stili */
  .back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 99999;
    background: rgba(0, 0, 0, 0.8);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 5px;
  }
</style>
</head>
<body>

<button class="back-btn" onclick="history.back()">← Geri</button>

<div id="game"></div>

<script>
  const params = new URLSearchParams(location.search);
  const core = params.get("core");
  const rom = params.get("rom");

  if (!core || !rom) {
    alert("Oyun bulunamadı!");
    window.location.href = "./";
  }

  window.EJS_player = "#game";
  window.EJS_core = core;
  window.EJS_gameUrl = decodeURIComponent(rom);
  window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";

  // --- MOBİLDE OTOMATİK YATAY VE TAM EKRAN YAPMA ---
  async function startFullscreen() {
    try {
      const elem = document.documentElement;
      if (elem.requestFullscreen) await elem.requestFullscreen();
      if (screen.orientation && screen.orientation.lock) {
        await screen.orientation.lock('landscape');
      }
    } catch (err) { console.log("Ekran döndürme desteklenmiyor."); }
  }

  // Kullanıcı "OYUNU BAŞLAT" dediğinde veya ekrana ilk dokunduğunda tetiklenir
  document.addEventListener("click", startFullscreen, { once: true });
</script>

<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
