<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oyun</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      max-width: 100%;
    }
    #game {
      width: 100%;
      height: 100%;
    }
    #error {
      display: none;
      color: #fff;
      padding: 20px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game"></div>
  </div>
  <div id="error"></div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const core = params.get("core");
      const rom = params.get("rom");

      const gameContainer = document.getElementById("game-container");
      const errorEl = document.getElementById("error");

      function fail(message) {
        gameContainer.style.display = "none";
        errorEl.style.display = "block";
        errorEl.textContent = message;
      }

      if (!core || !rom) {
        fail("Eksik parametre: core ve rom gerekli.");
        return;
      }

      window.addEventListener("error", function (e) {
        fail("JavaScript hatası: " + e.message);
      });

      window.addEventListener("unhandledrejection", function (e) {
        fail("Promise hatası: " + (e.reason?.message || e.reason || "Bilinmeyen hata"));
      });

      async function boot() {
        try {
          const loaderCheck = await fetch("data/loader.js", { method: "HEAD" });
          if (!loaderCheck.ok) {
            fail("data/loader.js bulunamadı.");
            return;
          }

          const romCheck = await fetch(rom, { method: "HEAD" });
          if (!romCheck.ok) {
            fail("ROM bulunamadı: " + rom);
            return;
          }

          window.EJS_player = "#game";
          window.EJS_core = core;
          window.EJS_gameUrl = rom;
          window.EJS_pathtodata = "data/";
          window.EJS_startOnLoaded = true;

          const script = document.createElement("script");
          script.src = "data/loader.js";
          script.onerror = function () {
            fail("EmulatorJS loader yüklenemedi.");
          };
          document.body.appendChild(script);
        } catch (err) {
          fail("Başlatma hatası: " + (err.message || String(err)));
        }
      }

      boot();
    })();
  </script>
</body>
</html>
