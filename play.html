<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oyun</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #game {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="game"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const core = params.get("core");
    const rom = params.get("rom");

    if (!core || !rom) {
      document.body.innerHTML = '<div style="color:white;padding:20px;font-family:Arial">Eksik parametre: core ve rom gerekli.</div>';
      throw new Error("Eksik parametre");
    }

    window.EJS_player = "#game";
    window.EJS_core = core;
    window.EJS_gameUrl = rom;
    window.EJS_pathtodata = "/data/";
  </script>
  <script src="/data/loader.js"></script>
</body>
</html>
