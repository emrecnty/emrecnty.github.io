<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oyun</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #game-container {
      width: 100vw;
      height: 100vh;
      max-width: 100%;
    }

    #game {
      width: 100%;
      height: 100%;
    }

    #error {
      display: none;
      color: #fff;
      padding: 20px;
      font-family: Arial, Helvetica, sans-serif;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game"></div>
  </div>
  <div id="error"></div>

  <script>
    (async function () {
      const params = new URLSearchParams(window.location.search);
      const core = params.get("core");
      const rom = params.get("rom");

      const gameContainer = document.getElementById("game-container");
      const errorEl = document.getElementById("error");

      function showError(message) {
        gameContainer.style.display = "none";
        errorEl.style.display = "block";
        errorEl.textContent = message;
      }

      if (!core || !rom) {
        showError("Eksik parametre: core ve rom gerekli.");
        return;
      }

      try {
        const loaderCheck = await fetch("/data/loader.js", { method: "HEAD" });
        if (!loaderCheck.ok) {
          showError("Hata: /data/loader.js yüklenemedi.");
          return;
        }

        const romCheck = await fetch(rom, { method: "HEAD" });
        if (!romCheck.ok) {
          showError("Hata: ROM dosyası yüklenemedi.\n" + rom);
          return;
        }
      } catch (err) {
        showError("Dosya kontrol hatası:\n" + err.message);
        return;
      }

      window.EJS_player = "#game";
      window.EJS_core = core;
      window.EJS_gameUrl = rom;
      window.EJS_pathtodata = "/data/";
      window.EJS_startOnLoaded = true;

      window.addEventListener("error", function (e) {
        showError("JavaScript hatası:\n" + (e.message || "Bilinmeyen hata"));
      });

      const script = document.createElement("script");
      script.src = "/data/loader.js";
      script.onerror = function () {
        showError("EmulatorJS loader yüklenemedi: /data/loader.js");
      };
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
