name: Build ROM Index

on:
  push:
    branches:
      - main
    paths:
      - "roms/**"
      - "scripts/build-rom-index.js"
      - ".github/workflows/build-rom-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: JSON üret
        run: node scripts/build-rom-index.js

      - name: Değişiklikleri kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/roms/*.json
          git diff --cached --quiet || git commit -m "Update ROM index [skip ci]"
          git push
