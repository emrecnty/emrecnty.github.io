<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8">
    <title>Retro Oyun Portalı</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .menu { margin-bottom: 30px; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #333; color: white; border: 1px solid #555; border-radius: 5px; }
        button:hover { background: #e74c3c; }
        #game-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #1e1e1e; border-radius: 10px; overflow: hidden; cursor: pointer; border: 1px solid #333; transition: 0.3s; }
        .game-card:hover { transform: scale(1.05); border-color: #e74c3c; }
        .game-card img { width: 100%; height: 240px; object-fit: cover; }
        .game-card p { padding: 10px; font-size: 14px; margin: 0; }
        #emulator-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        .close-btn { position: absolute; top: 10px; right: 10px; padding: 10px; background: red; color: white; border: none; cursor: pointer; z-index: 1001; }
    </style>
</head>
<body>

    <h1>EMRECNTY OYUN ARŞİVİ</h1>

    <div class="menu">
        <button onclick="loadList('nes', 'Nintendo_-_Nintendo_Entertainment_System')">NES</button>
        <button onclick="loadList('snes', 'Nintendo_-_Super_Nintendo_Entertainment_System')">SNES</button>
        <button onclick="loadList('genesis', 'Sega_-_Mega_Drive_-_Genesis')">GENESIS</button>
        <button onclick="loadList('mame', 'MAME')">MAME 2003</button>
    </div>

    <div id="game-list">Lütfen bir sistem seçin...</div>

    <div id="emulator-screen">
        <button class="close-btn" onclick="location.reload()">OYUNDAN ÇIK</button>
        <div id="game-container" style="width:100%;height:100%"></div>
    </div>

    <script>
        async function loadList(sys, libretroPath) {
            const listDiv = document.getElementById('game-list');
            listDiv.innerHTML = "Listeleniyor...";

            try {
                // 1. JSON dosyasını senin belirttiğin data/name içinden okur
                const response = await fetch(`./data/name/${sys}.json`);
                const games = await response.json();
                
                listDiv.innerHTML = "";
                games.forEach(game => {
                    // 2. Resim URL'ini Libretro'dan çekmek için ismi kullanır
                    const thumbUrl = `https://thumbnails.libretro.com/${libretroPath}/Named_Boxarts/${encodeURIComponent(game.name)}.png`;
                    
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    // 3. Oyun dosyasını senin görseldeki roms/sistem/ klasöründen çeker
                    card.onclick = () => startGame(`roms/${sys}/${game.file}`, game.core, game.name);

                    card.innerHTML = `
                        <img src="${thumbUrl}" onerror="this.src='https://via.placeholder.com/150x240?text=Resim+Yok'">
                        <p>${game.name}</p>
                    `;
                    listDiv.appendChild(card);
                });
            } catch (e) {
                listDiv.innerHTML = "Hata: JSON dosyası okunamadı!";
            }
        }

        function startGame(romPath, core, name) {
            document.getElementById('emulator-screen').style.display = 'block';
            window.EJS_player = '#game-container';
            window.EJS_gameUrl = romPath;
            window.EJS_core = core;
            window.EJS_gameName = name;
            window.EJS_pathtodata = 'data/';
            
            const loader = document.createElement('script');
            loader.src = 'data/loader.js';
            document.body.appendChild(loader);
        }
    </script>
</body>
</html>
