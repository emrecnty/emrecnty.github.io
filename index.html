<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>Retro Oyunlar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
<h1>Retro Oyunlar</h1>
<p>Test sayfası</p>

<script>
const SYSTEMS = [
  { key: "gb", label: "GB", core: "gb" },
  { key: "nes", label: "NES", core: "nes" },
  { key: "snes", label: "SNES", core: "snes" },
  { key: "genesis", label: "GENESIS", core: "segaMD" },
  { key: "mame", label: "MAME", core: "mame2003" }
];

function getPlayUrl(system, rom) {
  const romPath = `/roms/${system}/${rom}`;
  const core = SYSTEMS.find(s=>s.key===system).core;
  return `play.html?core=${encodeURIComponent(core)}&rom=${encodeURIComponent(romPath)}`;
}

// örnek link
document.body.innerHTML += '<p><a href="'+getPlayUrl("nes","1942 (Japan, USA).nes")+'">1942 NES TEST</a></p>';
</script>
</body>
</html>
