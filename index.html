<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Oyunlar</title>

<style>

body{
background:#111;
color:white;
font-family:Arial,sans-serif;
margin:0;
padding:20px;
}

h1{
margin-top:0;
margin-bottom:20px;
}

.systems{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.system-btn{
background:#222;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.system-btn.active{
background:#4da3ff;
}

#search{
width:100%;
max-width:500px;
padding:12px;
border-radius:8px;
border:none;
font-size:16px;
margin-bottom:20px;
box-sizing:border-box;
}

#status{
margin-bottom:15px;
color:#bbb;
}

.games{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.game-card{
display:block;
background:#1e1e1e;
border-radius:12px;
overflow:hidden;
position:relative;
transition:all 0.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.5);
text-decoration:none;
color:white;
}

.game-card:hover{
transform:scale(1.05);
box-shadow:0 8px 20px rgba(77,163,255,0.3);
}

.game-card img{
width:100%;
height:280px;
object-fit:cover;
display:block;
background:#222;
}

.game-info{
padding:12px;
text-align:center;
background:rgba(0,0,0,0.7);
position:absolute;
bottom:0;
left:0;
right:0;
}

.game-info h3{
margin:0;
font-size:18px;
color:#4da3ff;
word-break:break-word;
}

</style>
</head>

<body>

<h1>🎮 Retro Oyunlar</h1>

<div class="systems">
<button class="system-btn active" data-system="nes">NES</button>
<button class="system-btn" data-system="snes">SNES</button>
<button class="system-btn" data-system="genesis">GENESIS</button>
<button class="system-btn" data-system="mame">MAME</button>
</div>

<input id="search" type="text" placeholder="Oyun ara...">

<div id="status">Oyunlar yükleniyor...</div>

<div id="games" class="games"></div>

<script>

const owner="emrecnty";
const repo="emrecnty.github.io";

const systemConfig={
nes:{folder:"roms/nes",ext:".nes"},
snes:{folder:"roms/snes",ext:".sfc"},
genesis:{folder:"roms/genesis",ext:".gen"},
mame:{folder:"roms/mame",ext:".zip"}
};

let currentSystem="nes";
let allGames=[];

const gamesContainer=document.getElementById("games");
const statusEl=document.getElementById("status");
const searchEl=document.getElementById("search");
const systemButtons=document.querySelectorAll(".system-btn");

function stripExtension(filename,ext){
return filename.replace(ext,"");
}

function getThumbUrl(system,title){

let folder="";

if(system==="nes") folder="Nintendo - Nintendo Entertainment System";
if(system==="snes") folder="Nintendo - Super Nintendo Entertainment System";
if(system==="genesis") folder="Sega - Mega Drive - Genesis";
if(system==="mame") folder="MAME";

return "https://thumbnails.libretro.com/"+encodeURIComponent(folder)+"/Named_Snaps/"+encodeURIComponent(title)+".png";

}

function createImage(system,title){

const img=document.createElement("img");

const snap=getThumbUrl(system,title);

img.src=snap;

img.onerror=function(){
img.src="https://placehold.co/200x280/222/fff?text=No+Image";
};

return img;

}

function renderGames(filter=""){

gamesContainer.innerHTML="";

const filtered=allGames.filter(g=>g.toLowerCase().includes(filter.toLowerCase()));

statusEl.textContent=filtered.length+" oyun gösteriliyor";

filtered.forEach(file=>{

const name=file.replace(/\.[^/.]+$/,"");

const card=document.createElement("a");

card.className="game-card";

card.href="play.html?system="+currentSystem+"&rom="+file;

const img=createImage(currentSystem,name);

const info=document.createElement("div");

info.className="game-info";

info.innerHTML="<h3>"+name.replace(/[_\-\.]/g," ")+"</h3>";

card.appendChild(img);
card.appendChild(info);

gamesContainer.appendChild(card);

});

}

async function loadGames(system){

currentSystem=system;

statusEl.textContent="Oyunlar yükleniyor...";

const config=systemConfig[system];

const url="https://api.github.com/repos/"+owner+"/"+repo+"/contents/"+config.folder;

const res=await fetch(url);

const data=await res.json();

allGames=data
.filter(f=>f.name.endsWith(config.ext))
.map(f=>f.name)
.sort();

renderGames();

}

systemButtons.forEach(btn=>{

btn.onclick=function(){

systemButtons.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

loadGames(btn.dataset.system);

};

});

searchEl.addEventListener("input",function(){
renderGames(searchEl.value);
});

loadGames("nes");

</script>

</body>
</html>
